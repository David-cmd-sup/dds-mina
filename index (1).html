<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DDS">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>DDS — Sala de Controle</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;--green-text:#085041;
  --red:#E24B4A;--red-light:#FCEBEB;--red-text:#A32D2D;
  --amber:#EF9F27;--amber-light:#FAEEDA;--amber-text:#854F0B;
  --bg:#F5F5F3;--card:#ffffff;--border:#e8e8e5;
  --text:#1a1a18;--text2:#666;--text3:#aaa;
  --radius:12px;--radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text)}
.app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}

/* NAV BAR TOP */
.topnav{background:var(--green);color:white;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topnav-title{font-size:17px;font-weight:600;letter-spacing:-.3px}
.topnav-sub{font-size:12px;opacity:.8;margin-top:1px}
.topnav-badge{background:rgba(255,255,255,.2);font-size:12px;padding:4px 10px;border-radius:20px}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{display:none}

/* BOTTOM NAV */
.botnav{display:flex;background:var(--card);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--safe-bottom)}
.botnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;font-size:10px;color:var(--text3);gap:4px;border:none;background:none;cursor:pointer;transition:color .15s}
.botnav-btn.active{color:var(--green)}
.botnav-icon{font-size:22px;line-height:1}

/* PAGES */
.page{display:none}
.page.active{display:block}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:10px}
.card-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.kpi{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px}
.kpi-l{font-size:11px;color:var(--text3);margin-bottom:3px}
.kpi-v{font-size:24px;font-weight:600;line-height:1;color:var(--text)}
.kpi-s{font-size:11px;color:var(--text3);margin-top:3px}
.kpi-v.ok{color:#3B6D11}.kpi-v.alert{color:var(--red-text)}.kpi-v.warn{color:var(--amber-text)}

/* PEOPLE LIST */
.person-btn{display:flex;align-items:center;gap:12px;width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s;text-align:left}
.person-btn:active{transform:scale(.98);background:#f8f8f6}
.person-btn.done{background:var(--green-light);border-color:#5DCAA5}
.person-btn.done .person-name{color:var(--green-text)}
.person-av{width:40px;height:40px;border-radius:50%;background:#e8f5f1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--green-dark);flex-shrink:0}
.person-btn.done .person-av{background:#9FE1CB;color:var(--green-text)}
.person-name{font-size:15px;font-weight:500;color:var(--text)}
.person-cargo{font-size:12px;color:var(--text3);margin-top:2px}
.person-check{margin-left:auto;font-size:20px;color:var(--green);flex-shrink:0}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{font-size:13px;padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);white-space:nowrap;flex-shrink:0}
.tab.on{background:var(--green);color:white;border-color:var(--green)}

/* SEARCH */
.search-bar{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;gap:8px;margin-bottom:12px}
.search-bar input{border:none;background:transparent;font-size:15px;flex:1;color:var(--text);outline:none}
.search-bar input::placeholder{color:var(--text3)}

/* DDS FLOW */
.flow-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.flow-av{width:52px;height:52px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:var(--green-dark);flex-shrink:0}
.flow-name{font-size:18px;font-weight:600;color:var(--text)}
.flow-cargo{font-size:13px;color:var(--text2);margin-top:2px}

/* PROGRESS STEPS */
.steps{display:flex;align-items:center;margin-bottom:20px}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.step-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text3);background:var(--card)}
.step-dot.done{background:var(--green);border-color:var(--green);color:white}
.step-dot.active{border-color:var(--green);color:var(--green);background:var(--green-light)}
.step-label{font-size:10px;color:var(--text3);text-align:center}
.step-label.active{color:var(--green);font-weight:500}
.step-line{flex:1;height:2px;background:var(--border);margin-bottom:14px}
.step-line.done{background:var(--green)}

/* TEMA BOX */
.tema-box{background:var(--green-light);border-radius:var(--radius);padding:16px;margin-bottom:14px;border:1px solid #9FE1CB}
.tema-tag{font-size:11px;font-weight:600;color:var(--green-dark);letter-spacing:.05em;margin-bottom:6px}
.tema-titulo{font-size:17px;font-weight:600;color:var(--green-text);margin-bottom:8px;line-height:1.3}
.tema-ponto{font-size:13px;color:var(--green-dark);line-height:1.6}

/* ROTEIRO */
.roteiro{font-size:14px;line-height:1.8;color:var(--text);background:var(--bg);border-radius:var(--radius-sm);padding:14px;border:1px solid var(--border);margin-bottom:14px;white-space:pre-wrap}

/* CONFIRM */
.confirm-box{background:#E8F5E9;border:1px solid #A5D6A7;border-radius:var(--radius);padding:14px;margin-bottom:14px}
.confirm-box p{font-size:13px;color:#2E7D32;line-height:1.6}
.confirm-detail{font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:14px}
.confirm-detail strong{color:var(--text);font-weight:500}

/* BUTTONS */
.btn{width:100%;padding:15px;border-radius:var(--radius-sm);border:none;font-size:16px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.98)}
.btn-green{background:var(--green);color:white}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border);margin-top:8px}

/* SUCCESS */
.success-wrap{display:flex;flex-direction:column;align-items:center;padding:24px 0}
.success-icon{width:72px;height:72px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:16px}
.success-title{font-size:22px;font-weight:600;color:var(--text);margin-bottom:6px;text-align:center}
.success-sub{font-size:14px;color:var(--text2);text-align:center;margin-bottom:20px;line-height:1.6}
.success-card{background:var(--green-light);border-radius:var(--radius);padding:14px;width:100%;border:1px solid #9FE1CB;margin-bottom:20px}
.success-card p{font-size:13px;color:var(--green-text);line-height:1.8}
.success-card strong{color:var(--green-dark);font-weight:600}

/* REGISTRO */
.reg-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.reg-item:last-child{border-bottom:none}
.reg-av{width:36px;height:36px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--green-dark);flex-shrink:0}
.reg-nome{font-size:14px;font-weight:500;color:var(--text)}
.reg-sub{font-size:11px;color:var(--text3);margin-top:1px}
.reg-hora{margin-left:auto;font-size:12px;font-weight:500;color:var(--green-dark);background:var(--green-light);padding:3px 8px;border-radius:20px;flex-shrink:0}
.empty{text-align:center;padding:32px 0;font-size:14px;color:var(--text3);font-style:italic}

/* LIVE DOT */
.live{display:flex;align-items:center;gap:5px;font-size:12px;color:white;opacity:.9}
.live-dot{width:7px;height:7px;border-radius:50%;background:white;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* PROGRESS BAR */
.prog-bar-wrap{background:#e8f5f1;border-radius:4px;height:6px;margin-top:8px;overflow:hidden}
.prog-bar{height:100%;border-radius:4px;background:var(--green);transition:width .3s}

/* ALARM */
.alarm-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.alarm-row:last-child{border-bottom:none}
.alarm-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.alarm-dot.crit{background:var(--red)}
.alarm-dot.warn{background:var(--amber)}
.alarm-dot.info{background:#378ADD}
.alarm-txt{font-size:13px;color:var(--text);line-height:1.4;flex:1}
.alarm-sub{font-size:11px;color:var(--text3)}
.alarm-hora{font-size:11px;color:var(--text3);flex-shrink:0}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px 16px calc(20px + var(--safe-bottom));width:100%;max-height:92vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
</style>
</head>
<body>
<div class="app">

  <!-- TOP NAV -->
  <div class="topnav">
    <div>
      <div class="topnav-title">⛑ DDS — Sala de Controle</div>
      <div class="topnav-sub" id="top-sub"></div>
    </div>
    <div class="live"><div class="live-dot"></div>Ao vivo</div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="main-content">

    <!-- PAGE: HOME -->
    <div class="page active" id="page-home">
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-l">Total</div><div class="kpi-v">15</div><div class="kpi-s">colaboradores</div></div>
        <div class="kpi"><div class="kpi-l">Confirmados</div><div class="kpi-v ok" id="kpi-conf">0</div><div class="kpi-s">hoje</div></div>
        <div class="kpi"><div class="kpi-l">Pendentes</div><div class="kpi-v warn" id="kpi-pend">15</div><div class="kpi-s">aguardando</div></div>
        <div class="kpi"><div class="kpi-l">Turno atual</div><div class="kpi-v" id="kpi-turno" style="font-size:18px">—</div><div class="kpi-s" id="kpi-turno-h"></div></div>
      </div>

      <div class="card" style="margin-bottom:10px">
        <div class="card-title">Progresso do DDS</div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:4px">
          <span>0%</span><span id="pct-txt">0%</span>
        </div>
        <div class="prog-bar-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
      </div>

      <div class="search-bar">
        <span style="font-size:18px;color:var(--text3)">🔍</span>
        <input type="text" placeholder="Buscar colaborador..." id="busca" oninput="filtrar()">
      </div>

      <div class="tabs">
        <button class="tab on" onclick="setFiltro('todos',this)">Todos</button>
        <button class="tab" onclick="setFiltro('pendente',this)">Pendentes</button>
        <button class="tab" onclick="setFiltro('feito',this)">Confirmados</button>
      </div>

      <div id="lista-pessoas"></div>
    </div>

    <!-- PAGE: DDS FLOW -->
    <div class="page" id="page-dds">
      <div id="dds-conteudo"></div>
    </div>

    <!-- PAGE: REGISTRO -->
    <div class="page" id="page-registro">
      <div class="card">
        <div class="card-title">
          Registro do dia
          <span id="reg-count" style="font-size:12px;background:var(--green-light);color:var(--green-dark);padding:2px 10px;border-radius:20px"></span>
        </div>
        <div id="reg-lista"><div class="empty">Nenhuma confirmação ainda.</div></div>
      </div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="botnav">
    <button class="botnav-btn active" onclick="irPage('home',this)" id="btn-nav-home">
      <span class="botnav-icon">🏠</span>Lista
    </button>
    <button class="botnav-btn" onclick="irPage('registro',this)" id="btn-nav-registro">
      <span class="botnav-icon">📋</span>Registro
    </button>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="fecharModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const PESSOAS = [
  {n:"Carlos Rodrigues",  i:"CR", c:"Operador Sênior",     t:"A"},
  {n:"Fernanda Lima",     i:"FL", c:"Técnica de Segurança", t:"A"},
  {n:"João Alves",        i:"JA", c:"Operador",            t:"B"},
  {n:"Mariana Costa",     i:"MC", c:"Supervisora",         t:"A"},
  {n:"Rafael Souza",      i:"RS", c:"Eletricista",         t:"B"},
  {n:"Ana Ferreira",      i:"AF", c:"Operadora",           t:"C"},
  {n:"Paulo Mendes",      i:"PM", c:"Mecânico",            t:"B"},
  {n:"Luciana Barros",    i:"LB", c:"Analista",            t:"A"},
  {n:"Thiago Pereira",    i:"TP", c:"Operador",            t:"C"},
  {n:"Camila Nunes",      i:"CN", c:"Técnica",             t:"A"},
  {n:"Eduardo Teixeira",  i:"ET", c:"Operador Sênior",     t:"B"},
  {n:"Patrícia Gomes",    i:"PG", c:"Supervisora",         t:"C"},
  {n:"Diego Martins",     i:"DM", c:"Eletricista",         t:"A"},
  {n:"Renata Oliveira",   i:"RO", c:"Analista",            t:"B"},
  {n:"Gustavo Carvalho",  i:"GC", c:"Mecânico",            t:"C"},
];

const DDS = {
  titulo: "Segurança Elétrica em Painéis de Controle",
  ponto: "Nunca abra painéis sem autorização e bloqueio LOTO — tensões podem ser fatais.",
  roteiro: `Bom dia! Antes de iniciarmos o turno, vamos falar sobre segurança elétrica em painéis de controle — algo do nosso dia a dia aqui na sala.

Os painéis operam com tensões que podem ser letais. Mesmo baixa tensão representa risco de choque, queimadura por arco elétrico e incêndio. O risco existe mesmo quando parece desligado.

Na prática: nunca abra painel sem ordem de serviço e bloqueio LOTO aplicado. Use os EPIs corretos — luvas isolantes, óculos e vestimenta antiarco. Inspecione visualmente cabos, bornes e disjuntores antes de qualquer intervenção.

O que NÃO fazer: nunca improvise reparos sem habilitação. Não trabalhe sozinho em painéis energizados. Nunca ignore alarmes ou indicadores de falha.

Lembre-se: cada procedimento seguido protege sua vida e a dos colegas. Vamos ter um turno seguro!`
};

const KEY = 'dds_' + new Date().toISOString().slice(0,10);
let registros = JSON.parse(localStorage.getItem(KEY) || '[]');
let pessoaAtual = null;
let filtroAtivo = 'todos';

function hora(){ const n=new Date(); return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); }
function jaFez(n){ return registros.some(r=>r.nome===n); }

function salvar(){ localStorage.setItem(KEY, JSON.stringify(registros)); }

function renderKPIs(){
  const conf = registros.length;
  document.getElementById('kpi-conf').textContent = conf;
  document.getElementById('kpi-pend').textContent = 15-conf;
  const pct = Math.round(conf/15*100);
  document.getElementById('prog-bar').style.width = pct+'%';
  document.getElementById('pct-txt').textContent = pct+'%';
  const h = new Date().getHours();
  const t = h<15?'A':h<23?'B':'C';
  const tl = t==='A'?'07h–15h':t==='B'?'15h–23h':'23h–07h';
  document.getElementById('kpi-turno').textContent = 'Turno '+t;
  document.getElementById('kpi-turno-h').textContent = tl;
}

function renderPessoas(){
  const busca = document.getElementById('busca').value.toLowerCase();
  const el = document.getElementById('lista-pessoas');
  el.innerHTML = '';
  PESSOAS.forEach(p => {
    const feito = jaFez(p.n);
    if(filtroAtivo==='feito' && !feito) return;
    if(filtroAtivo==='pendente' && feito) return;
    if(busca && !p.n.toLowerCase().includes(busca)) return;
    const btn = document.createElement('button');
    btn.className = 'person-btn' + (feito?' done':'');
    btn.innerHTML = `
      <div class="person-av">${feito?'✓':p.i}</div>
      <div>
        <div class="person-name">${p.n}</div>
        <div class="person-cargo">${p.c} · Turno ${p.t}</div>
      </div>
      ${feito ? '<div class="person-check">✓</div>' : '<div style="margin-left:auto;color:var(--text3);font-size:20px">›</div>'}
    `;
    if(!feito) btn.onclick = () => iniciarDDS(p);
    el.appendChild(btn);
  });
}

function renderRegistro(){
  const el = document.getElementById('reg-lista');
  document.getElementById('reg-count').textContent = registros.length + ' confirmações';
  if(!registros.length){ el.innerHTML='<div class="empty">Nenhuma confirmação ainda.</div>'; return; }
  el.innerHTML = registros.map(r=>`
    <div class="reg-item">
      <div class="reg-av">${r.iniciais}</div>
      <div>
        <div class="reg-nome">${r.nome}</div>
        <div class="reg-sub">${r.cargo} · Turno ${r.turno}</div>
      </div>
      <div class="reg-hora">${r.hora}</div>
    </div>`).join('');
}

function filtrar(){ renderPessoas(); }
function setFiltro(f,btn){
  filtroAtivo=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  renderPessoas();
}

function irPage(p, btn){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.botnav-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(btn) btn.classList.add('active');
  document.getElementById('main-content').scrollTop=0;
  if(p==='registro') renderRegistro();
}

function iniciarDDS(p){
  pessoaAtual = p;
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.botnav-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-dds').classList.add('active');
  renderPasso(1);
  document.getElementById('main-content').scrollTop=0;
}

function renderPasso(passo){
  const p = pessoaAtual;
  const passos = ['Tema','Roteiro','Confirmar'];
  const stepsHtml = passos.map((nm,i)=>{
    const n=i+1;
    const cls = n<passo?'done':n===passo?'active':'';
    const line = i<2 ? `<div class="step-line ${n<passo?'done':''}"></div>` : '';
    return `<div class="step">
      <div class="step-dot ${cls}">${n<passo?'✓':n}</div>
      <div class="step-label ${cls}">${nm}</div>
    </div>${line}`;
  }).join('');

  let corpo = '';
  if(passo===1){
    corpo = `
      <div class="tema-box">
        <div class="tema-tag">TEMA DE HOJE</div>
        <div class="tema-titulo">${DDS.titulo}</div>
        <div class="tema-ponto">⚠️ ${DDS.ponto}</div>
      </div>
      <button class="btn btn-green" onclick="renderPasso(2)">Li o tema →</button>
      <button class="btn btn-outline" onclick="voltarHome()">Cancelar</button>`;
  } else if(passo===2){
    corpo = `
      <div class="card" style="margin-bottom:12px">
        <div class="card-title">Roteiro do DDS</div>
        <div class="roteiro">${DDS.roteiro}</div>
      </div>
      <button class="btn btn-green" onclick="renderPasso(3)">Li o roteiro →</button>
      <button class="btn btn-outline" onclick="renderPasso(1)">‹ Voltar</button>`;
  } else if(passo===3){
    corpo = `
      <div class="confirm-box">
        <p>Ao confirmar, você declara que leu e está ciente das orientações de segurança do DDS de hoje.</p>
      </div>
      <div class="confirm-detail">
        <strong>Colaborador:</strong> ${p.n}<br>
        <strong>Tema:</strong> ${DDS.titulo}<br>
        <strong>Data:</strong> ${new Date().toLocaleDateString('pt-BR')} às ${hora()}<br>
        <strong>Turno:</strong> ${p.t}
      </div>
      <button class="btn btn-green" onclick="confirmar()">✓ Confirmar presença no DDS</button>
      <button class="btn btn-outline" onclick="renderPasso(2)">‹ Voltar</button>`;
  }

  document.getElementById('dds-conteudo').innerHTML = `
    <div class="flow-header">
      <div class="flow-av">${p.i}</div>
      <div>
        <div class="flow-name">${p.n}</div>
        <div class="flow-cargo">${p.c} — Turno ${p.t}</div>
      </div>
    </div>
    <div class="steps">${stepsHtml}</div>
    ${corpo}
  `;
  document.getElementById('main-content').scrollTop=0;
}

function confirmar(){
  const p = pessoaAtual;
  registros.push({nome:p.n, iniciais:p.i, cargo:p.c, turno:p.t, hora:hora()});
  salvar();
  renderKPIs();

  document.getElementById('dds-conteudo').innerHTML = `
    <div class="success-wrap">
      <div class="success-icon">✅</div>
      <div class="success-title">DDS concluído!</div>
      <div class="success-sub">Presença de ${p.n}<br>registrada com sucesso.</div>
      <div class="success-card">
        <p><strong>Tema:</strong> ${DDS.titulo}<br>
        <strong>Horário:</strong> ${hora()}<br>
        <strong>Turno:</strong> ${p.t}</p>
      </div>
      <button class="btn btn-green" onclick="voltarHome()">‹ Voltar para lista</button>
    </div>
  `;
  document.getElementById('main-content').scrollTop=0;
}

function voltarHome(){
  irPage('home', document.getElementById('btn-nav-home'));
  renderPessoas();
}

function fecharModal(e){
  if(e.target.id==='modal-overlay') document.getElementById('modal-overlay').classList.remove('open');
}

function init(){
  const now = new Date();
  const h = now.getHours();
  const t = h<15?'A':h<23?'B':'C';
  document.getElementById('top-sub').textContent =
    now.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'}) + ' · Turno ' + t;
  renderKPIs();
  renderPessoas();
  renderRegistro();
}

// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

init();
</script>
</body>
</html>
